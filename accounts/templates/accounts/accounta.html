{% extends 'purchase/basic_layout.html' %}


  {% block style %}
    <style>

        .main{
            align-items: center;
            justify-content: center;
        }
        .form-container {
            width: 60%;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="number"] {
            width: -webkit-fill-available;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #45a049;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-container {
                padding: 15px;
                box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            }
            input[type="text"], input[type="number"], button {
                padding: 12px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 20px;
            }
            input[type="text"], input[type="number"] {
                padding: 8px;
                font-size: 14px;
            }
            button {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
  {% endblock style %}

  {% block body %}

<div class="main">
<div class="form-container">
    <h2>Add Party Account</h2>
    <form action="{% url 'Account_Add_Party' %}" method="post"> {% csrf_token %}
        <label for="gstin">GSTIN:</label>
        <input type="text" id="gstin" name="gstin" placeholder="Enter GSTIN" required>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" placeholder="Enter your address" required>

        <label for="pincode">Pincode:</label>
        <input type="number" id="pincode" name="pincode" placeholder="Enter pincode" required>

        <button type="submit">Submit</button>
    </form>
</div>
  </div>
{% endblock body %}


{% block javaScript%}

{% endblock javaScript%}
